# Standalone local development compose
# Usage: docker compose -f docker-compose.dev.yml up -d
# Access: http://localhost (Caddy :80)
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: trackwild-db-dev
    restart: unless-stopped
    shm_size: "512mb"
    environment:
      POSTGRES_USER: trackwild
      POSTGRES_PASSWORD: trackwild
      POSTGRES_DB: trackwild
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackwild -d trackwild"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: trackwild-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://trackwild:trackwild@db:5432/trackwild"
      TILE_CACHE_DIR: "/tile_cache"
      LOG_LEVEL: debug
      SECRET_KEY: dev-secret-not-for-production
      ENV: development
    volumes:
      - tile_cache-dev:/tile_cache

  frontend:
    build:
      context: ../frontend
      args:
        CADDYFILE: Caddyfile.dev
    container_name: trackwild-frontend-dev
    restart: unless-stopped
    ports:
      - "80:80"

  osm_import:
    image: iboates/osm2pgsql:latest
    container_name: trackwild-osm-import-dev
    platform: linux/amd64
    profiles:
      - osm-import
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: trackwild
    volumes:
      - ../pbf:/data/pbf:ro
      - ../backend/scripts/osm2pgsql_style.lua:/data/style.lua:ro
    entrypoint: >
      osm2pgsql
      --create
      -H db
      -P 5432
      -U trackwild
      -d trackwild
      --slim
      --cache 2048
      --number-processes 2
      -O flex
      -S /data/style.lua
      /data/pbf/northwestern-fed-district-latest.osm.pbf

volumes:
  pgdata-dev:
  tile_cache-dev:
