# Production docker-compose
# Usage: docker compose -f docker-compose.yml up -d
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: trackwild-db
    restart: unless-stopped
    shm_size: "512mb"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trackwild-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ../backend
    container_name: trackwild-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      TILE_CACHE_DIR: "/tile_cache"
      RISK_PROFILES_PATH: "/app/config/risk_profiles.json"
      TILE_WORKERS: ${TILE_WORKERS:-8}
      PREGEN_ENABLED: ${PREGEN_ENABLED:-true}
      PREGEN_Z_MIN: ${PREGEN_Z_MIN:-3}
      PREGEN_Z_MAX: ${PREGEN_Z_MAX:-12}
      PREGEN_BBOX: ${PREGEN_BBOX:-"28.0,65.5,42.0,71.5"}
      LOG_LEVEL: ${LOG_LEVEL}
      SECRET_KEY: ${SECRET_KEY}
      ENV: production
    volumes:
      - tile_cache:/tile_cache
      - ../backend/config/risk_profiles.json:/app/config/risk_profiles.json:ro
    networks:
      - internal
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ../frontend
      args:
        CADDYFILE: ${CADDYFILE:-Caddyfile.prod}
    container_name: trackwild-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-trackwild.ru}
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend

  osm_import:
    image: iboates/osm2pgsql:latest
    container_name: trackwild-osm-import
    platform: linux/amd64
    profiles:
      - osm-import
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../pbf:/data/pbf:ro
      - ../backend/scripts/osm2pgsql_style.lua:/data/style.lua:ro
    networks:
      - internal
    entrypoint: >
      osm2pgsql
      --create
      -H db
      -P 5432
      -U ${POSTGRES_USER}
      -d ${POSTGRES_DB}
      --slim
      --cache 2048
      --number-processes 4
      -O flex
      -S /data/style.lua
      /data/pbf/northwestern-fed-district-latest.osm.pbf

volumes:
  pgdata:
  tile_cache:
  redisdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    internal: true
  frontend:
