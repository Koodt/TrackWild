services:
  frontend:
    build:
      context: ../frontend
    container_name: trackwild-frontend
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    environment:
      DOMAIN: trackwild.ru
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
