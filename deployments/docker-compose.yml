# Production docker-compose
# Usage: docker compose -f docker-compose.yml up -d
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: trackwild-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: trackwild-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      TILE_CACHE_DIR: "/tile_cache"
      LOG_LEVEL: ${LOG_LEVEL}
      SECRET_KEY: ${SECRET_KEY}
      ENV: production
    volumes:
      - tile_cache:/tile_cache
    networks:
      - internal
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      args:
        CADDYFILE: Caddyfile.prod
    container_name: trackwild-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "443:443"
      - "80:80"
    environment:
      DOMAIN: trackwild.ru
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend

volumes:
  pgdata:
  tile_cache:
  caddy_data:
  caddy_config:

networks:
  internal:
    internal: true
  frontend:
